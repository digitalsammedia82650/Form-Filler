<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FormFiller Pro | Universal AI Engine</title>

<style>
:root {
  --ink:#0f1117; --surface:#ffffff; --border:#ccd0d9;
  --accent:#1d4ed8; --green:#15803d;
}
*{box-sizing:border-box;margin:0;padding:0}
body{height:100vh;display:flex;flex-direction:column;background:var(--ink);font-family:Inter,sans-serif}
.topbar{height:50px;background:#000;color:#fff;display:flex;align-items:center;padding:0 20px;font-weight:800}
.toolbar{background:#fff;padding:10px;display:flex;gap:10px}
.workspace{flex:1;display:flex}
#formCanvas{flex:1;background:#fff;margin:20px;padding:60px;overflow:auto}
.data-panel{width:300px;background:#fff;border-left:1px solid var(--border);overflow:auto}
.data-item{padding:10px;border-bottom:1px solid var(--border)}
.fv{color:blue;font-weight:bold;background:#eef}
.btn{padding:6px 12px;border:none;cursor:pointer}
</style>
</head>

<body>

<div class="topbar">FORMFILLER PRO ● UNIVERSAL ENGINE</div>

<div class="toolbar">
<input type="file" id="formFile">
<button class="btn" onclick="loadForm()">Load Form</button>
<input type="file" id="resumeFile">
<button class="btn" onclick="loadResume()">Extract Data</button>
<button class="btn" onclick="autoDetectAndFill()">⚡ Smart Fill</button>
<button class="btn" onclick="exportPDF()">Export</button>
</div>

<div class="workspace">
<div id="formCanvas" contenteditable="true">Drop your form here</div>
<div class="data-panel" id="dataPanel"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
let persona = {};
const canvas = document.getElementById("formCanvas");
const panel = document.getElementById("dataPanel");

async function loadForm(){
 const file = document.getElementById("formFile").files[0];
 if(!file) return;
 const ext = file.name.split('.').pop();
 if(ext==='docx'){
  const res = await mammoth.convertToHtml({arrayBuffer:await file.arrayBuffer()});
  canvas.innerHTML = res.value;
 } else {
  canvas.innerHTML = await file.text();
 }
}

async function loadResume(){
 const file = document.getElementById("resumeFile").files[0];
 if(!file) return;
 let text="";
 const ext=file.name.split('.').pop();
 if(ext==='pdf'){
  const pdf = await pdfjsLib.getDocument(await file.arrayBuffer()).promise;
  for(let i=1;i<=pdf.numPages;i++){
    const page=await pdf.getPage(i);
    const content=await page.getTextContent();
    text+=content.items.map(i=>i.str).join(" ");
  }
 } else {
  const res = await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});
  text = res.value;
 }

 persona = extractUniversal(text);
 renderPanel();
}

function extractUniversal(text){
 let data={};

 const patterns = {
  name: /(name|candidate|applicant)[:\-]?\s*([A-Z][a-z]+\s[A-Z][a-z]+)/i,
  email: /([\w.-]+@[\w.-]+\.[A-Za-z]{2,})/,
  phone: /(\+?\d{1,3}[\s-]?)?\d{10}/,
  address: /(address|location)[:\-]?\s*(.+)/i,
  skills: /(skills|expertise)[:\-]?\s*(.+)/i
 };

 for(let key in patterns){
  let match = text.match(patterns[key]);
  if(match) data[key]=match[2]||match[1];
 }

 return data;
}

function renderPanel(){
 panel.innerHTML="";
 for(let key in persona){
  panel.innerHTML += `<div class="data-item"><b>${key}</b><br><input value="${persona[key]}" id="${key}"></div>`;
 }
}

function autoDetectAndFill(){
 let html = canvas.innerHTML;

 Object.keys(persona).forEach(key=>{
   let value = document.getElementById(key).value;

   let regex = new RegExp(`(${key}|${key.replace(/\b\w/g,l=>l.toUpperCase())})\\s*[:\\-]?\\s*(\\.|_|\\s){2,}`,'gi');
   html = html.replace(regex, `$1: <span class='fv'>${value}</span>`);

   let tdRegex = new RegExp(`(<td[^>]*>${key}.*?<\\/td>\\s*<td[^>]*>)(.*?)(<\\/td>)`,'gi');
   html = html.replace(tdRegex, `$1<span class='fv'>${value}</span>$3`);
 });

 canvas.innerHTML = html;
}

function exportPDF(){
 html2pdf().from(canvas).save();
}
</script>

</body>
</html>
