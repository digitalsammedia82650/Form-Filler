<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FormFiller Pro | Universal Safe Mode</title>

<style>
:root {
  --ink:#0f1117; --surface:#fff; --border:#ccd0d9;
  --accent:#1d4ed8; --green:#15803d;
}
*{box-sizing:border-box;margin:0;padding:0;}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  font-family:Inter,sans-serif;
  background:var(--ink);
}

/* TOP */
.topbar{
  height:50px;
  display:flex;
  align-items:center;
  padding:0 20px;
  background:#111;
  color:#fff;
  font-weight:700;
}

/* TOOLBAR */
.toolbar{
  background:#fff;
  padding:10px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  padding:7px 12px;
  border:none;
  cursor:pointer;
  font-size:11px;
  font-weight:700;
}
.btn-blue{background:#1d4ed8;color:#fff;}
.btn-green{background:#15803d;color:#fff;}

/* WORKSPACE */
.workspace{flex:1;display:flex;background:#2c2e33;overflow:hidden;}
.form-container{flex:1;overflow:auto;padding:20px;display:flex;justify-content:center;}

/* FULL WHITE CANVAS FIX */
#formCanvas{
  width:100%;
  max-width:900px;
  min-height:1500px;
  background:#fff;
  padding:60px;
  box-shadow:0 0 20px rgba(0,0,0,0.4);
  position:relative;
  overflow:visible;
}

/* PRESERVE ORIGINAL STYLE */
#formCanvas * {
  max-width:100%;
}

/* SIDEBAR */
.data-panel{
  width:350px;
  background:#fff;
  display:flex;
  flex-direction:column;
  border-left:1px solid #ccc;
}

textarea{
  width:100%;
  height:220px;
  padding:10px;
  font-size:12px;
  resize:vertical;
}

/* PHOTO */
#photoNode{
  position:absolute;
  width:120px;
  height:150px;
  border:1px solid #000;
  background-size:cover;
  background-position:center;
  top:40px;
  right:40px;
  display:none;
  cursor:move;
}
</style>
</head>

<body>

<div class="topbar">
FORMFILLER PRO ● UNIVERSAL SAFE MODE
</div>

<div class="toolbar">
<input type="file" id="formFile" accept=".docx,.html">
<button class="btn btn-blue" onclick="loadForm()">Load Form</button>

<input type="file" id="resumeFile" accept=".pdf,.docx">
<button class="btn btn-blue" onclick="loadResume()">Extract Full</button>
<button class="btn btn-green" onclick="extractMain()">Extract Main</button>

<button class="btn btn-blue" onclick="pasteResume()">Paste Resume</button>

<input type="file" accept="image/*" onchange="addPhoto(this)">
<button class="btn btn-blue" onclick="exportPDF()">Download PDF</button>
</div>

<div class="workspace">

<div class="form-container">
<div id="formCanvas" contenteditable="true">
<h2 style="text-align:center;margin-top:200px;color:#999">
Load your form to begin
</h2>
<div id="photoNode"></div>
</div>
</div>

<div class="data-panel">
<div style="padding:10px;font-weight:700;">EXTRACTED DATA</div>
<textarea id="output"></textarea>

<div style="padding:10px;">
<button class="btn btn-green" onclick="copyData()">Copy Data</button>
</div>
</div>

</div>

<!-- LIBRARIES (ONLINE MODE) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
let rawText = "";

/* LOAD FORM */
async function loadForm(){
  const file=document.getElementById('formFile').files[0];
  if(!file) return;

  const ext=file.name.split('.').pop().toLowerCase();

  if(ext==='docx'){
    if(!window.mammoth){
      alert("DOCX not supported offline. Use HTML.");
      return;
    }
    const res=await mammoth.convertToHtml({arrayBuffer:await file.arrayBuffer()});
    formCanvas.innerHTML=res.value;
  }else{
    formCanvas.innerHTML=await file.text();
  }
}

/* LOAD RESUME */
async function loadResume(){
  const file=document.getElementById('resumeFile').files[0];
  if(!file) return;

  const ext=file.name.split('.').pop().toLowerCase();

  if(ext==='pdf'){
    if(!window['pdfjs-dist/build/pdf']){
      alert("PDF not supported offline. Paste manually.");
      return;
    }

    const pdfjsLib=window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc=
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    const pdf=await pdfjsLib.getDocument(await file.arrayBuffer()).promise;

    rawText="";
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const content=await page.getTextContent();
      rawText+=content.items.map(i=>i.str).join(" ");
    }

  }else{
    if(!window.mammoth){
      alert("DOCX not supported offline.");
      return;
    }
    const res=await mammoth.extractRawText({arrayBuffer:await file.arrayBuffer()});
    rawText=res.value;
  }

  document.getElementById('output').value=rawText;
}

/* EXTRACT MAIN */
function extractMain(){
  let name=(rawText.match(/name[:\s]+([A-Za-z ]+)/i)||[])[1]||"";
  let email=(rawText.match(/[\w.-]+@[\w.-]+\.\w+/)||[])[0]||"";
  let phone=(rawText.match(/\+?\d[\d\s\-]{8,}/)||[])[0]||"";

  document.getElementById('output').value=
  "Name: "+name+"\nEmail: "+email+"\nPhone: "+phone;
}

/* MANUAL PASTE */
function pasteResume(){
  const t=prompt("Paste resume text:");
  if(t){
    rawText=t;
    document.getElementById('output').value=t;
  }
}

/* COPY */
function copyData(){
  const t=document.getElementById('output');
  t.select();
  document.execCommand('copy');
  alert("Copied!");
}

/* PHOTO */
function addPhoto(input){
  const reader=new FileReader();
  reader.onload=e=>{
    const p=document.getElementById('photoNode');
    p.style.backgroundImage=`url(${e.target.result})`;
    p.style.display='block';
  }
  reader.readAsDataURL(input.files[0]);
}

/* DRAG PHOTO */
let photo=document.getElementById("photoNode");
let active=false,xOff=0,yOff=0;

document.addEventListener("mousedown",e=>{
  if(e.target===photo){
    active=true;
    xOff=e.clientX-photo.offsetLeft;
    yOff=e.clientY-photo.offsetTop;
  }
});

document.addEventListener("mouseup",()=>active=false);

document.addEventListener("mousemove",e=>{
  if(active){
    photo.style.left=(e.clientX-xOff)+"px";
    photo.style.top=(e.clientY-yOff)+"px";
  }
});

/* EXPORT */
function exportPDF(){
  if(typeof html2pdf==="undefined"){
    alert("Offline mode: use Print → Save as PDF");
    window.print();
    return;
  }

  html2pdf().from(formCanvas).save();
}
</script>

</body>
</html>
