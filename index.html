<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FormFiller Pro</title>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:    #edecea;
  --surf:  #f8f7f5;
  --b1:    #dedad4;
  --b2:    #c5c1bb;
  --ink:   #1c1b18;
  --ink2:  #5c5a55;
  --ink3:  #9c9a95;
  --accent:   #1a56db;
  --aclt:     #e8f0fe;
  --green:    #166534;
  --greenlt:  #dcfce7;
  --amber:    #92400e;
  --purple:   #5b21b6;
  --topbar:   52px;
  --r:        7px;
}

html,body { height:100%; width:100%; overflow:hidden; font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--ink); }
.app { display:flex; flex-direction:column; height:100vh; }

/* ── Topbar ── */
.topbar {
  height:var(--topbar); flex-shrink:0; background:var(--surf); border-bottom:1px solid var(--b1);
  display:flex; align-items:center; padding:0 20px; gap:10px;
}
.brand { font-size:15px; font-weight:600; letter-spacing:-0.4px; }
.brand em { color:var(--accent); font-style:normal; }

.ubtn {
  padding:6px 14px; border-radius:var(--r); font-size:12px; font-weight:500; cursor:pointer;
  border:1px solid var(--b2); background:var(--surf); transition: all .1s;
}
.ubtn.ur { border-color:#93c5fd; background:#eff6ff; color:#1e40af; }
.ubtn.up { border-color:#c4b5fd; background:#f5f3ff; color:var(--purple); }
.ubtn.done { border-color:var(--green)!important; background:var(--greenlt)!important; color:var(--green)!important; }

.xbtn {
  margin-left:auto; padding:6px 16px; border-radius:var(--r); font-size:12px; font-weight:600;
  background:var(--accent); color:#fff; border:none; cursor:pointer;
}

/* ── Workspace ── */
.workspace { flex:1; display:flex; overflow:hidden; }
.doc-panel { flex:1; overflow-y:auto; padding:40px; display:flex; flex-direction:column; align-items:center; }
.paper-wrap { width:100%; max-width:840px; display:none; }
#docFrame { width:100%; border:none; box-shadow:0 10px 30px rgba(0,0,0,0.1); background:#fff; border-radius:4px; }

.resizer { width:4px; cursor:col-resize; background:var(--b1); transition: background .2s; }
.resizer:hover { background:var(--accent); }

/* ── Sidebar & Cards ── */
.sidebar { width:320px; background:var(--surf); border-left:1px solid var(--b1); display:flex; flex-direction:column; }
.sbar-hd { padding:12px; border-bottom:1px solid var(--b1); display:flex; justify-content:space-between; align-items:center; }
.sbar-body { flex:1; overflow-y:auto; padding:10px; display:flex; flex-direction:column; gap:8px; }

.sec-lbl { font-size:9px; font-weight:700; text-transform:uppercase; color:var(--ink3); margin:10px 0 4px; font-family:'DM Mono',monospace; }

.ecard {
  border:1px solid var(--b1); border-radius:var(--r); padding:10px; background:#fff; cursor:pointer;
  transition: transform 0.1s, border-color 0.1s;
}
.ecard:hover { border-color:var(--accent); transform: translateY(-1px); }
.ecard.copied { border-color:var(--green); background:var(--greenlt); }

.etype { font-size:8px; font-weight:800; text-transform:uppercase; margin-bottom:4px; font-family:'DM Mono',monospace; }
.t-match { color:var(--accent); } .t-high { color:var(--green); } .t-low { color:var(--ink3); }

.ev { font-size:12px; font-weight:500; margin-bottom:6px; word-break:break-all; }

/* Progress Bar */
.ebar-track { height:3px; background:var(--bg); border-radius:2px; overflow:hidden; margin-top:4px; }
.ebar-fill { height:100%; transition: width 0.3s; }
.b-blue { background:var(--accent); } .b-green { background:var(--green); } .b-gray { background:var(--b2); }
.epct { font-size:8px; color:var(--ink3); margin-top:3px; font-family:'DM Mono',monospace; }

#toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--ink); color:#fff; padding:8px 16px; border-radius:20px; font-size:12px; display:none; z-index:1000; }
input[type="file"] { display:none; }
</style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <span class="brand">Form<em>Filler</em> Pro</span>
    <button class="ubtn" id="btnF" onclick="document.getElementById('fIn').click()">Choose Form</button>
    <button class="ubtn ur" id="btnR" onclick="document.getElementById('rIn').click()">Choose Resume</button>
    <button class="ubtn up" id="btnP" onclick="document.getElementById('pIn').click()">Photo</button>
    <button class="xbtn" onclick="exportPDF()">Export PDF</button>
  </div>

  <div class="workspace">
    <div class="doc-panel">
      <div id="empty" style="text-align:center; margin-top:100px;">
        <h3 style="color:var(--ink2)">No Document Loaded</h3>
        <p style="color:var(--ink3); font-size:13px;">Upload a .docx form to start.</p>
      </div>
      <div class="paper-wrap" id="paperWrap">
        <iframe id="docFrame"></iframe>
      </div>
    </div>

    <div class="resizer" id="resizer"></div>

    <div class="sidebar">
      <div class="sbar-hd">
        <span style="font-size:11px; font-weight:700;">EXTRACTED DATA</span>
        <span class="cnt" id="cntBadge">0</span>
      </div>
      <div class="sbar-body" id="sbarBody"></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<input type="file" id="fIn" accept=".docx" onchange="loadForm()">
<input type="file" id="rIn" accept=".docx" onchange="loadResume()">
<input type="file" id="pIn" accept="image/*" onchange="loadPhoto()">

<script>
let resumeText='', formText='', formHtml='', photoSrc=null;

/* ═══ UTILS ═══ */
function notify(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}

function escRx(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function matchScore(candidate, ftxt) {
  if(!candidate || candidate.length < 3) return 0;
  const words = candidate.toLowerCase().split(/\W+/).filter(w => w.length > 2);
  if(!words.length) return 0;
  const fl = ftxt.toLowerCase();
  const hits = words.filter(w => fl.includes(w)).length;
  return Math.round((hits / words.length) * 100);
}

function getTrace(v) {
  return v.toUpperCase().replace(/[^A-Z]/g,'').substring(0,3).split('').map(c=>c.charCodeAt(0)).join('.');
}

/* ═══ IFRAME WRITER ═══ */
function writeFrame(html) {
  const frame = document.getElementById('docFrame');
  const doc = frame.contentDocument;
  const shell = `<html><head><style>
    body{margin:0;padding:60px 80px;font-family:serif;font-size:12pt;line-height:1.6;color:#333;}
    .pb{min-height:1000px; outline:none; position:relative;}
    table{border-collapse:collapse;width:100%;margin:10px 0;}
    td,th{border:1px solid #999;padding:6px;}
    .mf{background:rgba(26,86,219,0.08); border-bottom:2px solid #1a56db; color:#1a56db; font-weight:bold; cursor:pointer;}
    #photoEl{position:absolute;width:120px;height:150px;top:0;right:0;border:1px dashed #ccc;display:none;background-size:cover;cursor:move;}
  </style></head><body>
  <div class="pb" id="pb" contenteditable="true" spellcheck="false">
    <div id="photoEl" contenteditable="false"></div>
    ${html}
  </div>
  <script>
    const pb=document.getElementById('pb');
    function sh(){ parent.postMessage({t:'h',v:document.body.scrollHeight},'*'); }
    new ResizeObserver(sh).observe(pb);
    pb.addEventListener('click', e => {
      if(e.target.classList.contains('mf')) parent.postMessage({t:'cp',v:e.target.innerText},'*');
    });
    const p=document.getElementById('photoEl');
    p.onmousedown=e=>{
      let ox=e.clientX-p.offsetLeft, oy=e.clientY-p.offsetTop;
      document.onmousemove=ev=>{p.style.left=(ev.clientX-ox)+'px';p.style.top=(ev.clientY-oy)+'px';};
      document.onmouseup=()=>{document.onmousemove=null;};
    };
  <\/script></body></html>`;
  doc.open(); doc.write(shell); doc.close();
}

window.onmessage = e => {
  if(e.data.t==='h') document.getElementById('docFrame').style.height = e.data.v + 'px';
  if(e.data.t==='cp') { navigator.clipboard.writeText(e.data.v); notify('Copied to clipboard'); }
};

/* ═══ LOADERS ═══ */
async function loadForm(){
  const f = document.getElementById('fIn').files[0];
  const ab = await f.arrayBuffer();
  const raw = await mammoth.extractRawText({arrayBuffer:ab});
  formText = raw.value;
  const html = await mammoth.convertToHtml({arrayBuffer:ab});
  formHtml = html.value;
  writeFrame(formHtml);
  document.getElementById('empty').style.display='none';
  document.getElementById('paperWrap').style.display='block';
  document.getElementById('btnF').classList.add('done');
  if(resumeText) runExtraction();
}

async function loadResume(){
  const f = document.getElementById('rIn').files[0];
  const ab = await f.arrayBuffer();
  const raw = await mammoth.extractRawText({arrayBuffer:ab});
  resumeText = raw.value;
  document.getElementById('btnR').classList.add('done');
  if(formText) runExtraction();
}

function loadPhoto(){
  const f = document.getElementById('pIn').files[0];
  const rd = new FileReader();
  rd.onload = e => {
    const el = document.getElementById('docFrame').contentDocument.getElementById('photoEl');
    el.style.backgroundImage = `url(${e.target.result})`;
    el.style.display = 'block';
    document.getElementById('btnP').classList.add('done');
  };
  rd.readAsDataURL(f);
}

/* ═══ THE EXTRACTION ENGINE ═══ */
function runExtraction() {
  const body = document.getElementById('sbarBody');
  body.innerHTML = '';
  const used = new Set();
  const buckets = { matched: [], high: [], low: [] };

  // 1. Identify Field Labels in the Form (e.g., "Full Name:", "Address:")
  const labels = [];
  const rx = /([A-Z][A-Za-z\s]{2,25}):/g;
  let m; while(m = rx.exec(formText)) labels.push(m[1].trim());

  // 2. Scan Resume for direct Label matches
  labels.forEach(l => {
    const reg = new RegExp(escRx(l) + '[\\s:]+([^\\n]{2,50})', 'i');
    const match = resumeText.match(reg);
    if(match && !used.has(match[1].trim())) {
      const val = match[1].trim();
      buckets.matched.push({ label: l, value: val, score: 100 });
      used.add(val);
    }
  });

  // 3. Extract common patterns (Emails, Phones)
  const email = (resumeText.match(/[a-zA-Z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}/g) || [])[0];
  const phone = (resumeText.match(/(?:\+?1[\s-.]?)?\(?\d{3}\)?[\s-.]?\d{3}[\s-.]?\d{4}/g) || [])[0];
  
  [email, phone].forEach(v => {
    if(v && !used.has(v)) {
      const sc = matchScore(v, formText);
      if(sc > 20) buckets.high.push({ label: 'Contact', value: v, score: sc });
      else buckets.low.push({ label: 'Contact', value: v, score: sc });
      used.add(v);
    }
  });

  // 4. Chunk remaining resume lines and score them
  resumeText.split('\n').forEach(line => {
    const l = line.trim();
    if(l.length < 5 || used.has(l)) return;
    const sc = matchScore(l, formText);
    if(sc > 30) buckets.high.push({ label: 'Relevant Info', value: l, score: sc });
    else if(sc > 5) buckets.low.push({ label: 'Data Point', value: l, score: sc });
  });

  // Render Sidebar
  renderBucket(body, 'Direct Matches', buckets.matched, 't-match', 'b-blue');
  renderBucket(body, 'High Relevance', buckets.high, 't-high', 'b-green');
  renderBucket(body, 'Other Data', buckets.low, 't-low', 'b-gray');

  document.getElementById('cntBadge').textContent = used.size;
  
  // Highlight Form
  let newHtml = formHtml;
  buckets.matched.forEach(item => {
    const reg = new RegExp('(' + escRx(item.label) + '[\\s:]+)([_\\s\\.]{3,})', 'i');
    newHtml = newHtml.replace(reg, `$1<span class="mf">${item.value}</span>`);
  });
  writeFrame(newHtml);
}

function renderBucket(container, title, items, tCls, bCls) {
  if(!items.length) return;
  const h = document.createElement('div'); h.className='sec-lbl'; h.textContent=title;
  container.appendChild(h);
  
  items.sort((a,b)=>b.score - a.score).forEach(item => {
    const card = document.createElement('div');
    card.className = 'ecard';
    card.innerHTML = `
      <div class="etype ${tCls}">${item.label}</div>
      <div class="ev">${item.value}</div>
      <div class="ebar-track"><div class="ebar-fill ${bCls}" style="width:${item.score}%"></div></div>
      <div class="epct">${item.score}% Match · Trace: ${getTrace(item.value)}</div>
    `;
    card.onclick = () => {
      navigator.clipboard.writeText(item.value);
      card.classList.add('copied');
      notify('Copied!');
      setTimeout(()=>card.classList.remove('copied'), 1000);
    };
    container.appendChild(card);
  });
}

function exportPDF() {
  const f = document.getElementById('docFrame');
  f.contentWindow.focus();
  f.contentWindow.print();
}

// Simple Resizer
const rz = document.getElementById('resizer');
const sb = document.querySelector('.sidebar');
rz.onmousedown = () => {
  document.onmousemove = e => {
    let w = window.innerWidth - e.clientX;
    if(w > 200 && w < 600) sb.style.width = w + 'px';
  };
  document.onmouseup = () => document.onmousemove = null;
};
</script>
</body>
</html>
